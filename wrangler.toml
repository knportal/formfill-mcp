  { pattern = "formfill.plenitudo.ai/api/*", zone_name = "plenitudo.ai" },
  { pattern = "formfill.plenitudo.ai/health", zone_name = "plenitudo.ai" },
  { pattern = "formfill.plenitudo.ai/smoke-test", zone_name = "plenitudo.ai" },
  { pattern = "formfill.plenitudo.ai/webhook/*", zone_name = "plenitudo.ai" },
  { pattern = "formfill.plenitudo.ai/stripe-webhook", zone_name = "plenitudo.ai" }
]
