name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Railway auto-deploys from GitHub integration — no action needed here.
  # Cloudflare Pages auto-deploys from GitHub integration — no action needed here.

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        run: npx wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
